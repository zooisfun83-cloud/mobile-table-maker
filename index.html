<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>뚝딱 도표 메이커 - Professional Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=Gaegu:wght@400;700&display=swap');
        
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #f8fafc;
            --system-danger: #ef4444;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
        }

        .font-handwriting {
            font-family: 'Gaegu', cursive;
        }

        .premium-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .data-grid {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            min-width: 100%;
            background: white;
            border: 1.5px solid #334155;
            table-layout: fixed;
        }
        
        .data-grid th, .data-grid td {
            border: 1px solid #e2e8f0;
            padding: 0;
            height: 56px;
            position: relative;
            vertical-align: middle;
        }

        .data-grid th {
            background-color: #f8fafc;
            font-weight: 700;
            color: #334155;
        }

        /* 셀 입력창 - 가로 길어짐 방지 & 자동 줄바꿈 완벽 적용 */
        .cell-input {
            width: 100%;
            background: transparent;
            outline: none;
            padding: 16px 12px;
            font-size: 15px;
            text-align: center;
            border: none;
            color: #1e293b;
            resize: none;
            overflow: hidden;
            display: block;
            word-break: break-all; /* 가로로 안 길어지고 무조건 밑으로 줄바꿈 */
            white-space: pre-wrap; /* 사용자가 친 엔터(줄바꿈) 유지 */
            box-sizing: border-box;
            line-height: 1.5;
            font-family: inherit;
        }

        .cell-input:focus {
            background-color: #f5f7ff;
            box-shadow: inset 0 0 0 2px var(--brand-primary);
        }

        .sidebar-index {
            background-color: #f1f5f9 !important;
            text-align: center;
            width: 70px;
            min-width: 70px !important;
            font-weight: 800;
            color: #475569;
        }

        .viewport-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1rem;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-button:hover {
            background: #f1f5f9;
            color: var(--system-danger);
            border-color: #fecaca;
        }

        .column-resizer {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 6px;
            cursor: col-resize;
            user-select: none;
            z-index: 10;
        }
        .column-resizer:hover {
            background: rgba(79, 70, 229, 0.3);
        }

        .export-hidden {
            display: none !important;
        }

        .birth-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--brand-primary);
            color: var(--brand-primary);
            font-weight: 800;
            font-size: 0.85rem;
            margin-left: 12px;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const LucideIcon = ({ children, size = 20, color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );

        const Plus = () => <LucideIcon><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></LucideIcon>;
        const Download = () => <LucideIcon><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></LucideIcon>;
        const Trash = ({ size = 16 }) => <LucideIcon size={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></LucideIcon>;

        // 입력할 땐 높이가 늘어나는 Textarea 유지! 캡처할 때만 몰래 div로 교체
        const AutoTextarea = ({ value, onChange, className, isExporting }) => {
            const textareaRef = useRef(null);

            useEffect(() => {
                if (!isExporting && textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            }, [value, isExporting]);

            if (isExporting) {
                // 저장 버튼 누른 직후: 글자 아랫단이 안 잘리도록 찰나의 순간에 div로 렌더링
                return (
                    <div className={className}>
                        {value || '\u00A0'}
                    </div>
                );
            }

            // 평상시 편집 모드: 엔터(줄바꿈) 완벽 지원되는 textarea
            return (
                <textarea
                    ref={textareaRef}
                    className={className}
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    rows={1}
                />
            );
        };

        function App() {
            const [entryText, setEntryText] = useState("");
            const [viewMode, setViewMode] = useState("draft");
            const [isExporting, setIsExporting] = useState(false);
            const [tableState, setTableState] = useState({ 
                title: "새로운 데이터 문서", 
                columnWidths: [], 
                headers: [], 
                rows: [] 
            });
            
            const captureAreaRef = useRef(null);
            const scrollAreaRef = useRef(null);

            const initializeTable = () => {
                const rawLines = entryText.trim().split('\n').filter(l => l.trim() !== "");
                const matrix = rawLines.length > 0 
                    ? rawLines.map(line => line.split(/[,/|\t]+/).map(item => item.trim()))
                    : [["항목", "내용"]];
                
                const colCount = Math.max(...matrix.map(r => r.length));
                const headers = ["ID"];
                for(let i = 0; i < colCount; i++) headers.push(String.fromCharCode(65 + i));
                
                const rows = matrix.map((r, i) => {
                    const row = [String(i + 1), ...r];
                    while(row.length < headers.length) row.push("");
                    return row;
                });

                setTableState({ 
                    title: "비즈니스 데이터 요약", 
                    columnWidths: headers.map(() => 140),
                    headers, 
                    rows 
                });
                setViewMode("editor");
            };

            const executeExport = async () => {
                if (!captureAreaRef.current) return;
                setIsExporting(true);
                
                // textarea가 div로 완벽히 변신할 수 있도록 0.15초 대기 후 찰칵!
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(captureAreaRef.current, {
                            scale: 2.5,
                            useCORS: true,
                            backgroundColor: "#ffffff",
                            logging: false
                        });
                        const dataUrl = canvas.toDataURL("image/png");
                        const anchor = document.createElement("a");
                        anchor.href = dataUrl;
                        anchor.download = `${tableState.title}_export.png`;
                        anchor.click();
                    } catch (error) {
                        console.error("Export failed:", error);
                    } finally {
                        setIsExporting(false); // 캡처 끝나면 다시 원상복구
                    }
                }, 150); 
            };

            const adjustColumnWidth = (index, newWidth) => {
                const updatedWidths = [...tableState.columnWidths];
                updatedWidths[index] = Math.max(60, newWidth);
                setTableState(prev => ({ ...prev, columnWidths: updatedWidths }));
            };

            const appendRow = () => {
                const emptyRow = Array(tableState.headers.length).fill("");
                emptyRow[0] = String(tableState.rows.length + 1);
                setTableState(prev => ({ ...prev, rows: [...prev.rows, emptyRow] }));
            };

            const deleteRow = (idx) => {
                if (tableState.rows.length <= 1) return;
                const filteredRows = tableState.rows.filter((_, i) => i !== idx);
                setTableState(prev => ({ ...prev, rows: filteredRows }));
            };

            const appendColumn = () => {
                const nextLabel = String.fromCharCode(64 + tableState.headers.length);
                setTableState(prev => ({
                    ...prev,
                    headers: [...prev.headers, nextLabel],
                    columnWidths: [...prev.columnWidths, 140],
                    rows: prev.rows.map(r => [...r, ""])
                }));
            };

            const deleteColumn = (idx) => {
                if (tableState.headers.length <= 2) return;
                setTableState(prev => ({
                    ...prev,
                    headers: prev.headers.filter((_, i) => i !== idx),
                    columnWidths: prev.columnWidths.filter((_, i) => i !== idx),
                    rows: prev.rows.map(row => row.filter((_, i) => i !== idx))
                }));
            };

            const handleHeaderChange = (i, val) => {
                const nextHeaders = [...tableState.headers];
                nextHeaders[i] = val;
                setTableState(prev => ({ ...prev, headers: nextHeaders }));
            };

            const handleCellChange = (rIdx, cIdx, val) => {
                const nextRows = [...tableState.rows];
                nextRows[rIdx][cIdx] = val;
                setTableState(prev => ({ ...prev, rows: nextRows }));
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-5 md:p-10">
                    <header className="mb-8 text-center fade-in">
                        <h1 className="text-3xl md:text-4xl font-extrabold text-indigo-900 tracking-tight mb-2">PRO TABLE ARCHITECT</h1>
                        <p className="text-slate-500 font-medium">Professional grade data management solution</p>
                    </header>

                    <main className="w-full max-w-5xl flex-grow">
                        {viewMode === "draft" ? (
                            <div className="premium-card p-6 md:p-10 fade-in">
                                <label className="block text-sm font-bold text-slate-500 uppercase tracking-widest mb-3 px-1">Source Data Input</label>
                                <textarea 
                                    className="w-full h-60 p-6 border border-slate-200 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 bg-slate-50 text-base font-medium transition-all"
                                    placeholder="데이터를 쉼표(,)나 줄바꿈으로 입력하세요.&#13;&#10;분류, 항목, 예산&#13;&#10;기획, 마케팅, 500&#13;&#10;개발, 인프라, 1200"
                                    value={entryText}
                                    onChange={(e) => setEntryText(e.target.value)}
                                />
                                <button 
                                    onClick={initializeTable}
                                    className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all"
                                >
                                    테이블 생성
                                </button>
                            </div>
                        ) : (
                            <div className="flex flex-col gap-6 fade-in">
                                <div className="premium-card overflow-hidden">
                                    <div className="p-4 md:p-8 bg-white overflow-x-auto" ref={scrollAreaRef}>
                                        <div ref={captureAreaRef} className="inline-block min-w-full p-2">
                                            <input 
                                                className="text-2xl font-black text-center w-full mb-8 outline-none border-b border-transparent focus:border-indigo-100 py-2 text-slate-800"
                                                value={tableState.title}
                                                onChange={(e) => setTableState(prev => ({...prev, title: e.target.value}))}
                                            />
                                            
                                            <table className="data-grid">
                                                <colgroup>
                                                    {tableState.columnWidths.map((w, i) => (
                                                        <col key={i} style={{ width: `${w}px` }} />
                                                    ))}
                                                </colgroup>
                                                <thead>
                                                    <tr className={isExporting ? "export-hidden" : ""}>
                                                        <th className="sidebar-index"></th>
                                                        {tableState.headers.map((_, i) => (
                                                            i !== 0 && (
                                                                <th key={`ctrl-${i}`} className="bg-slate-50/50 border-b-0">
                                                                    <div className="px-2 py-1">
                                                                        <button 
                                                                            onClick={() => deleteColumn(i)}
                                                                            className="action-button w-full h-8"
                                                                        >
                                                                            <Trash size={14} />
                                                                        </button>
                                                                    </div>
                                                                </th>
                                                            )
                                                        ))}
                                                    </tr>
                                                    <tr>
                                                        <th className="sidebar-index p-0">
                                                            <AutoTextarea 
                                                                className="cell-input font-bold uppercase tracking-wide !bg-transparent"
                                                                value={tableState.headers[0]}
                                                                onChange={(val) => handleHeaderChange(0, val)}
                                                                isExporting={isExporting}
                                                            />
                                                        </th>
                                                        {tableState.headers.map((h, i) => (
                                                            i !== 0 && (
                                                                <th key={`h-${i}`}>
                                                                    <AutoTextarea 
                                                                        className="cell-input font-bold uppercase tracking-wide"
                                                                        value={h}
                                                                        onChange={(val) => handleHeaderChange(i, val)}
                                                                        isExporting={isExporting}
                                                                    />
                                                                    {!isExporting && (
                                                                        <div 
                                                                            className="column-resizer"
                                                                            onMouseDown={(e) => {
                                                                                const startX = e.pageX;
                                                                                const startWidth = tableState.columnWidths[i];
                                                                                const moveHandler = (moveEvent) => {
                                                                                    adjustColumnWidth(i, startWidth + (moveEvent.pageX - startX));
                                                                                };
                                                                                const upHandler = () => {
                                                                                    window.removeEventListener('mousemove', moveHandler);
                                                                                    window.removeEventListener('mouseup', upHandler);
                                                                                };
                                                                                window.addEventListener('mousemove', moveHandler);
                                                                                window.addEventListener('mouseup', upHandler);
                                                                            }}
                                                                        />
                                                                    )}
                                                                </th>
                                                            )
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {tableState.rows.map((row, rIdx) => (
                                                        <tr key={`r-${rIdx}`}>
                                                            <td className="sidebar-index">
                                                                <div className="flex flex-col items-center justify-center gap-1 h-full w-full py-2">
                                                                    <AutoTextarea 
                                                                        className="cell-input text-sm text-slate-500 font-bold !bg-transparent !p-1"
                                                                        value={row[0]} 
                                                                        onChange={(val) => handleCellChange(rIdx, 0, val)}
                                                                        isExporting={isExporting}
                                                                    />
                                                                    {!isExporting && (
                                                                        <button 
                                                                            onClick={() => deleteRow(rIdx)}
                                                                            className="action-button w-8 h-8 mt-1"
                                                                        >
                                                                            <Trash size={14} />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            {row.map((cell, cIdx) => (
                                                                cIdx !== 0 && (
                                                                    <td key={`c-${rIdx}-${cIdx}`}>
                                                                        <AutoTextarea 
                                                                            className="cell-input"
                                                                            value={cell} 
                                                                            onChange={(val) => handleCellChange(rIdx, cIdx, val)}
                                                                            isExporting={isExporting}
                                                                        />
                                                                    </td>
                                                                )
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-slate-50 border-t border-slate-100 flex flex-wrap gap-4">
                                        <button onClick={appendRow} className="flex-1 h-12 flex items-center justify-center gap-2 bg-white border border-slate-200 rounded-lg font-bold text-slate-600 hover:border-indigo-300 hover:text-indigo-600 transition-all shadow-sm active:bg-slate-50">
                                            <Plus /> 행 추가
                                        </button>
                                        <button onClick={appendColumn} className="flex-1 h-12 flex items-center justify-center gap-2 bg-white border border-slate-200 rounded-lg font-bold text-slate-600 hover:border-indigo-300 hover:text-indigo-600 transition-all shadow-sm active:bg-slate-50">
                                            <Plus /> 열 추가
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => setViewMode("draft")}
                                        className="px-6 h-16 bg-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-300 transition-all"
                                    >
                                        재설정
                                    </button>
                                    <button 
                                        onClick={executeExport}
                                        className="flex-grow h-16 bg-slate-800 hover:bg-black text-white rounded-xl font-bold text-lg shadow-xl flex items-center justify-center gap-3 transition-all active:scale-[0.99]"
                                    >
                                        <Download /> 고화질 PNG 저장
                                    </button>
                                </div>
                                <p className="text-center text-slate-400 text-xs font-medium tracking-tight">캡처 시 불필요한 관리용 아이콘은 자동으로 제외됩니다.</p>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-10 mb-12 text-slate-600 font-extrabold flex items-center justify-center text-xl tracking-tighter">
                        <span className="opacity-80">2026/3/2</span>
                        <div className="birth-badge">완벽</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
